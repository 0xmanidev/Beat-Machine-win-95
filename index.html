<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Machine</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css"
</head>
<body>

<div id="desktop">

  <div class="app-window" id="appWindow">

    <div class="titlebar" id="titlebar">
      <div class="title-icon">♩</div>
      <span class="title-text">BEAT MACHINE</span>
      <div class="title-btns" id="titleBtns">
        <div class="tbtn" id="minimizeBtn" title="Minimize">_</div>
        <div class="tbtn" id="maximizeBtn" title="Maximize">□</div>
        <div class="tbtn" id="closeBtn" title="Close" style="color:#c03020;">✕</div>
      </div>
    </div>

    <div class="app-body" id="appBody">

      <div class="panel">
        <div class="transport-row">

          <div class="transport-cluster">
            <button class="btn-transport" id="playBtn" aria-label="Play / Pause">
              <span style="font-size:18px;" id="playIcon">▶</span>
              <span class="t-label" id="playLabel">PLAY</span>
            </button>
          </div>

          <div class="transport-sep"></div>

          <div class="bpm-cluster">
            <button class="bpm-arrow" id="bpmDown1" title="BPM -1">◀</button>
            <div class="bpm-display" id="bpmDisplay" title="Scroll or drag to change BPM">
              <div class="bpm-digits" id="bpmNum">85</div>
              <div class="bpm-unit">BPM</div>
            </div>
            <button class="bpm-arrow" id="bpmUp1" title="BPM +1">▶</button>
            <div style="display:flex;flex-direction:column;gap:2px;">
              <button class="bpm-arrow" id="bpmUp5" data-step="5" title="BPM +5" style="font-family:var(--mono);font-size:9px;height:20px;width:26px;">+5</button>
              <button class="bpm-arrow" id="bpmDown5" data-step="5" title="BPM -5" style="font-family:var(--mono);font-size:9px;height:20px;width:26px;">−5</button>
            </div>
          </div>

          <div class="transport-sep"></div>

          <div class="step-display">
            <div class="step-digits" id="stepCounter">--</div>
            <div class="step-unit">STEP</div>
          </div>

          <div style="display:flex;flex-direction:column;gap:3px;padding:0 4px;">
            <div style="display:flex;gap:4px;">
              <div class="led" id="tbl0"></div>
              <div class="led" id="tbl1"></div>
            </div>
            <div style="display:flex;gap:4px;">
              <div class="led" id="tbl2"></div>
              <div class="led" id="tbl3"></div>
            </div>
          </div>

          <div class="transport-sep"></div>

          <div class="status-cluster">
            <div class="led play" id="statusLed"></div>
            <span class="status-text" id="statusTxt">STOPPED</span>
          </div>

          <div style="flex:1;min-width:8px;"></div>

          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
            <div style="display:flex;flex-direction:column;gap:4px;min-width:110px;">
              <div class="sl-row">
                <span class="sl-label">Swing</span>
                <input type="range" id="sSwing" min="0" max="100" step="1" value="0" style="width:70px;">
                <span class="sl-val" id="sSwingV">0%</span>
              </div>
              <div class="sl-row">
                <span class="sl-label">Vinyl</span>
                <input type="range" id="sVinyl" min="0" max="100" step="1" value="30" style="width:70px;">
                <span class="sl-val" id="sVinylV">30%</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;min-width:110px;">
              <div class="sl-row">
                <span class="sl-label">Output</span>
                <input type="range" id="sVol" min="0" max="100" step="1" value="75" style="width:70px;">
                <span class="sl-val" id="sVolV">75%</span>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="main-area">

        <div class="seq-panel">
          <div class="seq-header">
            <div class="led on" style="background:#f0a000;box-shadow:0 0 3px #f0a000;"></div>
            STEP SEQUENCER
            <span style="font-size:9px;font-weight:400;color:var(--win-darker);font-family:var(--mono);margin-left:4px;">16 STEPS / 4 BEAT GROUPS</span>
          </div>
          <div class="seq-body">
            <div class="seq-track t-kick">
              <div class="trk-info">
                <div class="trk-pip" style="background:var(--kick);"></div>
                <span class="trk-lbl">Kick</span>
              </div>
              <div class="steps" id="sg-kick"></div>
              <input type="range" class="tvol" min="0" max="1" step="0.01" value="0.9" data-t="kick">
            </div>
            <div class="seq-track t-snare">
              <div class="trk-info">
                <div class="trk-pip" style="background:var(--snare);"></div>
                <span class="trk-lbl">Snare</span>
              </div>
              <div class="steps" id="sg-snare"></div>
              <input type="range" class="tvol" min="0" max="1" step="0.01" value="0.75" data-t="snare">
            </div>
            <div class="seq-track t-hihat">
              <div class="trk-info">
                <div class="trk-pip" style="background:var(--hihat);"></div>
                <span class="trk-lbl">Hihat</span>
              </div>
              <div class="steps" id="sg-hihat"></div>
              <input type="range" class="tvol" min="0" max="1" step="0.01" value="0.6" data-t="hihat">
            </div>
            <div class="seq-track t-perc">
              <div class="trk-info">
                <div class="trk-pip" style="background:var(--perc);"></div>
                <span class="trk-lbl">Perc</span>
              </div>
              <div class="steps" id="sg-perc"></div>
              <input type="range" class="tvol" min="0" max="1" step="0.01" value="0.5" data-t="perc">
            </div>
            <div class="seq-track t-bass">
              <div class="trk-info">
                <div class="trk-pip" style="background:var(--bass);"></div>
                <span class="trk-lbl">Bass</span>
              </div>
              <div class="steps" id="sg-bass"></div>
              <input type="range" class="tvol" min="0" max="1" step="0.01" value="0.7" data-t="bass">
            </div>
            <div class="seq-track t-chord">
              <div class="trk-info">
                <div class="trk-pip" style="background:var(--chord);"></div>
                <span class="trk-lbl">Chord</span>
              </div>
              <div class="steps" id="sg-chord"></div>
              <input type="range" class="tvol" min="0" max="1" step="0.01" value="0.55" data-t="chord">
            </div>
          </div>
        </div>

        <div class="side-panel">
          <div class="scene-header">SCENE BANK</div>
          <div class="preset-list" id="presetList">
            <div class="preset-item active" data-preset="boomkit"><span class="preset-num">01</span>Boom Kit</div>
            <div class="preset-item" data-preset="dustkit"><span class="preset-num">02</span>Dust Kit</div>
            <div class="preset-item" data-preset="tapesoul"><span class="preset-num">03</span>Tape Soul</div>
            <div class="preset-item" data-preset="midloop"><span class="preset-num">04</span>Midnight Loop</div>
            <div class="preset-item" data-preset="vinylpack"><span class="preset-num">05</span>Vinyl Pack</div>
            <div class="preset-item" data-preset="basement"><span class="preset-num">06</span>Basement Jazz</div>
          </div>
          <div style="display:flex;gap:2px;margin-top:2px;">
            <button class="btn" style="flex:1;font-size:13px;" id="clearBtn">Clear</button>
          </div>

          <div class="viz-wrap" style="margin-top:4px;">
            <canvas id="vizCanvas"></canvas>
          </div>

          <div class="beat-strip">
            <div style="font-family:var(--mono);font-size:9px;font-weight:700;margin-bottom:3px;color:var(--win-darker);letter-spacing:.5px;">BEAT</div>
            <div class="beat-leds">
              <div class="beat-led" id="bl0"></div>
              <div class="beat-led" id="bl1"></div>
              <div class="beat-led" id="bl2"></div>
              <div class="beat-led" id="bl3"></div>
            </div>
          </div>
        </div>

      </div>

      

    </div>
  </div>

</div>

<script src="assets/js/main.js"></script>
</body>
</html>
